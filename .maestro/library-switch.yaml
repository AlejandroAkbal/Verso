appId: dev.akbal.opdsreader
---
- openLink: exp+opds-reader://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081
- tapOn:
    text: "Open"
    optional: true
- tapOn:
    text: "Reload"
    optional: true
- tapOn:
    text: "Done"
    optional: true
- extendedWaitUntil:
    visible: "Library"
    timeout: 45000
- tapOn:
    id: "library-settings"
- extendedWaitUntil:
    visible: "OPDS Servers"
    timeout: 15000
- tapOn: "Calibre-Web Automated,.*"
- extendedWaitUntil:
    visible: "Calibre-Web Automated"
    timeout: 30000
- tapOn:
    id: "library-settings"
- extendedWaitUntil:
    visible: "OPDS Servers"
    timeout: 15000
- tapOn: "Project Gutenberg,.*"
- extendedWaitUntil:
    visible: "Project Gutenberg"
    timeout: 30000

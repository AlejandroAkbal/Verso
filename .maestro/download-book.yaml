appId: dev.akbal.opdsreader
---
- openLink: exp+opds-reader://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081
- tapOn:
    text: "Reload"
    optional: true
- extendedWaitUntil:
    visible: "Library"
    timeout: 90000
- extendedWaitUntil:
    visible: "Search your library"
    timeout: 30000
# Deep-link to a catalog book that is not on device (stable first-row seed title).
- openLink: opds-reader://book/af521524347c2af8cf57c1147ae6645d
- runFlow:
    when:
      visible: "Remove Download"
    commands:
      - tapOn: "Remove Download"
      - tapOn: "Remove Download"
- extendedWaitUntil:
    visible:
      id: "book-detail-download"
    timeout: 30000
- tapOn:
    id: "book-detail-download"
- extendedWaitUntil:
    visible:
      id: "book-detail-downloading"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "book-detail-download-success"
    timeout: 60000
    optional: true
- extendedWaitUntil:
    visible:
      id: "book-detail-read"
    timeout: 120000
- assertVisible:
    id: "book-detail-read"

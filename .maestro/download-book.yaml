appId: dev.akbal.opdsreader
---
- openLink: exp+opds-reader://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081
- tapOn:
    text: "Reload"
    optional: true
- extendedWaitUntil:
    visible: "Library"
    timeout: 90000
- extendedWaitUntil:
    visible: "Search your library"
    timeout: 30000
- tapOn:
    id: "library-settings"
- extendedWaitUntil:
    visible: "OPDS Servers"
    timeout: 15000
- tapOn: "Calibre-Web Automated,.*"
- tapOn:
    text: "Done"
    optional: true
- extendedWaitUntil:
    visible: "Calibre-Web Automated"
    timeout: 30000
# Deep-link to a CWA EPUB book that can be downloaded.
- openLink: opds-reader://book/a1cc9f5fe4ade588ea3181f7efedd184
- extendedWaitUntil:
    visible: "Atomic Habits.*"
    timeout: 30000
- runFlow:
    when:
      visible:
        id: "book-detail-remove-download"
    commands:
      - tapOn:
          id: "book-detail-remove-download"
      - tapOn: "Remove Download"
- extendedWaitUntil:
    visible:
      id: "book-detail-download"
    timeout: 30000
- tapOn:
    id: "book-detail-download"
- extendedWaitUntil:
    visible:
      id: "book-detail-downloading"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "book-detail-download-success"
    timeout: 60000
    optional: true
- extendedWaitUntil:
    visible:
      id: "book-detail-read"
    timeout: 120000
- assertVisible:
    id: "book-detail-read"
